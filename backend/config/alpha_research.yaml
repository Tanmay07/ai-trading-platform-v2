alpha_research:
  dataset_path: "data/ml_datasets/dataset_v2.parquet"
  report_path: "data/models/alpha_research_report.json"
  
  market_regimes:
    vix_high_threshold: 20.0
    vix_low_threshold: 12.0
    
  holding_periods:
    - 2
    - 3
    - 4
    - 5
    - 6
    - 7
    - 8
    - 10
    
  feature_importance:
    surrogate_model: "RandomForestRegressor"
    max_samples: 100000  # Sample size for SHAP to avoid memory exhaustion
    n_estimators: 50
    max_depth: 8
    
  significance_threshold:
    min_trades: 500
    p_value: 0.05
