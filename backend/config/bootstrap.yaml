bootstrap:
  db_path: "bootstrap_recovery.db"
  
  execution:
    parallel_workers: 4
    timeout_minutes: 360  # 6 hours max for a full bootstrap
    checkpoint_frequency_symbols: 50
    max_symbols: 5 # Keeping this for safe testing
    
  recovery:
    max_retries: 3
    retry_delay_seconds: 10
    
  stages:
    environment: true
    universe: true
    historical: true
    features: true
    datasets: true
    models: true
    predictions: true
    portfolio: true
