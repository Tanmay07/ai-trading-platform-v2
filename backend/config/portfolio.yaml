limits:
  max_sector_exposure: 0.30
  max_stock_allocation: 0.15
  correlation_threshold: 0.70

kelly:
  fraction_multiplier: 0.5   # Half-Kelly by default for safety
  max_kelly_allocation: 0.15

rebalance:
  frequency: "monthly"
  drift_tolerance: 0.05

optimization:
  method: "mean_variance"    # alternative: "risk_parity"
  risk_free_rate: 0.07       # 7% Indian Govt Bond approx

stress_test:
  market_crash: -0.10
  volatility_spike: 0.50
