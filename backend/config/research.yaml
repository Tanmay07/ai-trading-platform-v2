genetic_optimizer:
  population_size: 50
  generations: 10
  mutation_rate: 0.05
  crossover_rate: 0.7
  elitism: 0.1

validation_thresholds:
  min_sharpe: 1.5
  min_cagr: 0.15
  max_drawdown: 0.20
  min_win_rate: 0.55
  
alpha_decay:
  rolling_window_days: 90
  sharpe_decay_threshold: 0.20
  
schedules:
  factor_discovery: "nightly"
  strategy_optimization: "weekly"
